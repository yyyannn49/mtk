<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core - Statistik Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap');

        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-glow: #818cf8;
            --neon-blue: #38bdf8;
            --neon-purple: #c084fc;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(129, 140, 248, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(192, 132, 252, 0.15) 0%, transparent 40%);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .header p {
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        textarea {
            width: 100%;
            padding: 18px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: var(--neon-blue);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
            resize: none;
        }

        textarea:focus {
            outline: none;
            border-color: var(--neon-blue);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 20px;
            background: linear-gradient(45deg, #4f46e5, #9333ea);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        button:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 15px 30px rgba(147, 51, 234, 0.4);
            filter: brightness(1.2);
        }

        .results {
            margin-top: 50px;
            display: none;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; filter: blur(10px); }
            to { opacity: 1; filter: blur(0); }
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .node {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .node .tag { font-size: 0.65rem; color: var(--text-secondary); margin-bottom: 5px; display: block; }
        .node .val { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; color: var(--text-primary); }

        .equation-display {
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        .equation-display span {
            display: block;
            font-size: 0.7rem;
            color: var(--neon-blue);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .equation-display div {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            color: var(--text-primary);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        .r-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card-neon {
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 3px solid transparent;
        }

        .card-neon.blue { border-bottom-color: var(--neon-blue); }
        .card-neon.purple { border-bottom-color: var(--neon-purple); }

        .desc {
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
            padding: 20px;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
        }

        @media (max-width: 650px) {
            .input-grid { grid-template-columns: 1fr; }
            .stats-container { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>STATS CORE v2.0</h1>
        <p>made by @mhmdrynhaqqi</p>
    </div>
    
    <div class="input-grid">
        <div>
            <label>Variable X [Inputs]</label>
            <textarea id="inX" placeholder="2 3 4 5 6 7 8"></textarea>
        </div>
        <div>
            <label>Variable Y [Outputs]</label>
            <textarea id="inY" placeholder="55 60 65 70 75 80 85"></textarea>
        </div>
    </div>

    <button onclick="runEngine()">Execute Analysis</button>

    <div id="display" class="results">
        <div class="stats-container">
            <div class="node"><span class="tag">N-SIZE</span><div class="val" id="oN"></div></div>
            <div class="node"><span class="tag">SUM X</span><div class="val" id="oSx"></div></div>
            <div class="node"><span class="tag">SUM Y</span><div class="val" id="oSy"></div></div>
            <div class="node"><span class="tag">SS_XX</span><div class="val" id="oSSxx"></div></div>
            <div class="node"><span class="tag">SS_YY</span><div class="val" id="oSSyy"></div></div>
            <div class="node"><span class="tag">SS_XY</span><div class="val" id="oSSxy"></div></div>
        </div>

        <div class="equation-display">
            <span>PREDICTION MODEL</span>
            <div id="oTopi"></div>
        </div>

        <div class="r-cards">
            <div class="card-neon blue">
                <span style="font-size: 0.6rem; letter-spacing: 2px;">CORRELATION (r)</span>
                <div id="oR" style="font-size: 1.8rem; font-weight: 700; margin-top: 5px;"></div>
            </div>
            <div class="card-neon purple">
                <span style="font-size: 0.6rem; letter-spacing: 2px;">DETERMINATION (R²)</span>
                <div id="oR2" style="font-size: 1.8rem; font-weight: 700; margin-top: 5px;"></div>
            </div>
        </div>

        <div id="oDesc" class="desc"></div>
    </div>
</div>

<script>
    const f = (n) => Number(n.toFixed(4));

    function runEngine() {
        const x = document.getElementById('inX').value.trim().split(/[\s,]+/).map(Number).filter(v => !isNaN(v));
        const y = document.getElementById('inY').value.trim().split(/[\s,]+/).map(Number).filter(v => !isNaN(v));

        if (x.length !== y.length || x.length < 2) {
            alert("FATAL ERROR: Data Mismatch or Empty Fields.");
            return;
        }

        const n = x.length;
        let sx=0, sy=0, sx2=0, sy2=0, sxy=0;

        x.forEach((v, i) => {
            sx += v; sy += y[i];
            sx2 += v**2; sy2 += y[i]**2;
            sxy += v*y[i];
        });

        const ssxx = sx2 - (sx**2/n);
        const ssyy = sy2 - (sy**2/n);
        const ssxy = sxy - (sx*sy/n);
        const b = ssxy / ssxx;
        const a = (sy/n) - (b * (sx/n));
        const r = ssxy / Math.sqrt(ssxx * ssyy);

        // Render UI
        document.getElementById('oN').innerText = n;
        document.getElementById('oSx').innerText = f(sx);
        document.getElementById('oSy').innerText = f(sy);
        document.getElementById('oSSxx').innerText = f(ssxx);
        document.getElementById('oSSyy').innerText = f(ssyy);
        document.getElementById('oSSxy').innerText = f(ssxy);
        document.getElementById('oTopi').innerText = `ŷ = ${f(a)} + ${f(b)}x`;
        document.getElementById('oR').innerText = f(r);
        document.getElementById('oR2').innerText = (r**2*100).toFixed(2) + "%";
        
        document.getElementById('oDesc').innerHTML = `> ANALYSIS COMPLETE: Relationship is <b>${r>0?'POSITIVE':'NEGATIVE'}</b>. <br>> CONFIDENCE LEVEL: <b>${Math.abs(r)>0.8?'HIGH':'NOMINAL'}</b>.`;
        document.getElementById('display').style.display = 'block';
    }
</script>

</body>
</html>
