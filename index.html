<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core - Statistik Engine v5.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap');

        :root {
            --bg-dark: #020617;
            --card-bg: #0f172a;
            --neon-blue: #38bdf8;
            --neon-purple: #c084fc;
            --neon-green: #10b981;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(56, 189, 248, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(192, 132, 252, 0.08) 0%, transparent 30%);
            color: var(--text-primary);
            margin: 0; padding: 40px 20px; min-height: 100vh;
        }

        .container {
            max-width: 900px; margin: 0 auto;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px); padding: 40px;
            border-radius: 28px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            font-size: 2.5rem; 
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0; 
        }

        .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        label { font-size: 0.7rem; color: var(--neon-blue); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        textarea {
            width: 100%; height: 100px; background: #020617; border: 1px solid var(--border);
            border-radius: 16px; color: var(--text-primary); padding: 15px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 20px; background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            color: white; border: none; border-radius: 16px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 3px; cursor: pointer; transition: 0.4s;
        }

        /* --- LOADING OVERLAY --- */
        #loadingOverlay {
            display: none; text-align: center; margin-top: 30px;
        }

        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(56, 189, 248, 0.1);
            border-top: 5px solid var(--neon-blue); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .ig-promo {
            font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
            color: var(--neon-purple); animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- RESULTS --- */
        .results { display: none; margin-top: 50px; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .grid-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .stat-card span { font-size: 0.55rem; color: var(--text-secondary); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-card div { font-family: 'JetBrains Mono', monospace; font-size: 1rem; color: var(--text-primary); }
        
        .highlight-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .highlight-box { padding: 25px; border-radius: 20px; border: 1px solid rgba(16, 185, 129, 0.2); background: rgba(16, 185, 129, 0.05); text-align: center; }
        .highlight-box.purple { border-color: rgba(192, 132, 252, 0.2); background: rgba(192, 132, 252, 0.05); }
        .highlight-box .val { font-size: 2rem; font-family: 'JetBrains Mono', monospace; margin: 10px 0; }

        .equation-bar { background: #020617; padding: 30px; border-radius: 20px; border-left: 4px solid var(--neon-blue); text-align: center; margin-bottom: 30px; }
        .equation-bar div { font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; }

        .analysis-section { background: rgba(255,255,255,0.02); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        .analysis-text { font-size: 0.95rem; line-height: 1.8; color: var(--text-secondary); }

        @media (max-width: 650px) { .input-section, .grid-stats, .highlight-container { grid-template-columns: 1fr; } .grid-stats { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>STATS CORE V5.1</h1>
        <p>// AI ENGINE: CORRELATION & REGRESSION COMPLETE</p>
    </div>

    <div class="input-section">
        <div><label>Data Variabel X</label><textarea id="inX" placeholder="2, 3, 4, 5..."></textarea></div>
        <div><label>Data Variabel Y</label><textarea id="inY" placeholder="55, 60, 65, 70..."></textarea></div>
    </div>

    <button id="btnCalc" onclick="startProcess()">Jalankan Analisis Data</button>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="ig-promo">MENGHITUNG MATRIKS...</div>
        <div style="margin-top: 10px; color: var(--text-secondary); font-size: 0.8rem;">
            Follow Instagram: <span style="color: white; font-weight: bold;">@username_kamu</span>
        </div>
    </div>

    <div id="res" class="results">
        <div class="grid-stats">
            <div class="stat-card"><span>Sampel (n)</span><div id="oN"></div></div>
            <div class="stat-card"><span>SSxx</span><div id="oSSxx"></div></div>
            <div class="stat-card"><span>SSxy</span><div id="oSSxy"></div></div>
            <div class="stat-card"><span>SSyy</span><div id="oSSyy"></div></div>
            <div class="stat-card" style="background: rgba(192, 132, 252, 0.1);"><span>Korelasi (r)</span><div id="oR" style="color: var(--neon-purple); font-weight: bold;"></div></div>
            <div class="stat-card" style="background: rgba(56, 189, 248, 0.1);"><span>Determinasi (R²)</span><div id="oR2" style="color: var(--neon-blue); font-weight: bold;"></div></div>
        </div>

        <div class="highlight-container">
            <div class="highlight-box">
                <div style="font-size: 0.7rem; color: var(--neon-green); letter-spacing: 1px;">INTERSEP (a)</div>
                <div class="val" id="oA"></div>
            </div>
            <div class="highlight-box purple">
                <div style="font-size: 0.7rem; color: var(--neon-purple); letter-spacing: 1px;">KEMIRINGAN (b)</div>
                <div class="val" id="oB"></div>
            </div>
        </div>

        <div class="equation-bar">
            <span style="font-size: 0.7rem; color: var(--neon-blue); letter-spacing: 3px;">PERSAMAAN REGRESI</span>
            <div id="oTopi"></div>
        </div>

        <div class="analysis-section">
            <h2 style="font-size: 1.1rem; color: var(--neon-blue);">LAPORAN KESIMPULAN AI</h2>
            <div class="analysis-text" id="oAnalysis"></div>
        </div>
    </div>
</div>

<script>
    const f = (n) => Number(n.toFixed(4));

    function startProcess() {
        const x = document.getElementById('inX').value.trim();
        const y = document.getElementById('inY').value.trim();

        if (!x || !y) {
            alert("Harap masukkan data terlebih dahulu!");
            return;
        }

        document.getElementById('res').style.display = 'none';
        document.getElementById('btnCalc').style.display = 'none';
        document.getElementById('loadingOverlay').style.display = 'block';

        setTimeout(() => {
            calculateLogic();
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('btnCalc').style.display = 'block';
            document.getElementById('res').style.display = 'block';
        }, 5000);
    }

    function calculateLogic() {
        const xArr = document.getElementById('inX').value.trim().split(/[\s,]+/).map(Number).filter(v => !isNaN(v));
        const yArr = document.getElementById('inY').value.trim().split(/[\s,]+/).map(Number).filter(v => !isNaN(v));

        const n = xArr.length;
        let sx=0, sy=0, sx2=0, sy2=0, sxy=0;
        xArr.forEach((v, i) => {
            sx += v; sy += yArr[i];
            sx2 += v**2; sy2 += yArr[i]**2;
            sxy += v*yArr[i];
        });

        const ssxx = sx2 - (sx**2/n);
        const ssyy = sy2 - (sy**2/n);
        const ssxy = sxy - (sx*sy/n);
        
        const b = ssxy / ssxx;
        const a = (sy/n) - (b * (sx/n));
        const r = ssxy / Math.sqrt(ssxx * ssyy);
        const r2 = r**2;

        document.getElementById('oN').innerText = n;
        document.getElementById('oSSxx').innerText = f(ssxx);
        document.getElementById('oSSxy').innerText = f(ssxy);
        document.getElementById('oSSyy').innerText = f(ssyy);
        document.getElementById('oA').innerText = f(a);
        document.getElementById('oB').innerText = f(b);
        document.getElementById('oR').innerText = f(r);
        document.getElementById('oR2').innerText = f(r2);
        document.getElementById('oTopi').innerText = `ŷ = ${f(a)} + (${f(b)})x`;

        let kekuatan = "";
        const absR = Math.abs(r);
        if (absR >= 0.8) kekuatan = "Sangat Kuat";
        else if (absR >= 0.6) kekuatan = "Kuat";
        else if (absR >= 0.4) kekuatan = "Cukup Kuat";
        else kekuatan = "Lemah";
        
        document.getElementById('oAnalysis').innerHTML = `
            Analisis selesai. Ditemukan koefisien korelasi <b>r = ${f(r)}</b> yang menunjukkan hubungan <b>${r > 0 ? 'Positif' : 'Negatif'}</b> 
            dengan tingkat kekuatan <b>${kekuatan}</b>.<br><br>
            
            Koefisien Determinasi <b>R² = ${f(r2)}</b> (${(r2 * 100).toFixed(2)}%) mengindikasikan bahwa <b>${(r2 * 100).toFixed(2)}%</b> variasi variabel Y dapat dijelaskan oleh variabel X dalam model ini. 
            Sisa <b>${(100 - (r2 * 100)).toFixed(2)}%</b> dijelaskan oleh variabel lain di luar penelitian.
        `;
    }
</script>

</body>
</html>
